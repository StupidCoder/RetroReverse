<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>framedbg</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="toolbar">
  <span class="brand">framedbg</span>
  <span id="target" class="muted">connecting…</span>
  <span class="sep"></span>

  <button id="play" title="free-run the machine (space)">▶ Play</button>
  <button id="step">Step to drawn frame</button>
  <button id="step1">Step 1 field</button>
  <label class="check"><input type="checkbox" id="overdraw" checked> overdraw</label>

  <span class="sep"></span>
  <span id="cpu-controls">
    <button id="cpu-step" title="one instruction">Step instr</button>
    <button id="cpu-run" title="run until a breakpoint or a breaking watch">Run</button>
    <button id="cpu-brk">Break</button>
    <span class="sep"></span>
  </span>

  <label class="check"><input type="checkbox" id="scanout"> scanout</label>
  <label>zoom
    <select id="zoom">
      <option value="1">1×</option>
      <option value="2" selected>2×</option>
      <option value="3">3×</option>
      <option value="4">4×</option>
    </select>
  </label>

  <span class="grow"></span>
  <span id="stats" class="muted"></span>
</header>

<!-- The dock. Panels mount themselves into these slots, and which ones exist depends
     on what the target says it can do. -->
<main>
  <div id="slot-stage" class="slot"></div>
  <div id="slot-side" class="slot"></div>
</main>
<footer id="slot-bottom" class="slot"></footer>

<script type="module" src="app.js"></script>
</body>
</html>
