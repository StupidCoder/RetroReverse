<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>framedbg</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="toolbar">
  <span class="brand">framedbg</span>
  <select id="game" title="the games under games/ that have an adapter">
    <option value="">library…</option>
  </select>
  <span id="target" class="muted">connecting…</span>
  <span class="sep"></span>

  <button id="play" title="free-run the machine (space)">▶ Play</button>
  <button id="step" title="step until the game draws a scene (N)">Step frame</button>
  <button id="step1" title="advance exactly one video field">+1 field</button>
  <label class="check" title="record every write to every pixel, for the overdraw pane">
    <input type="checkbox" id="overdraw" checked> overdraw</label>

  <span class="sep"></span>
  <span id="cpu-controls">
    <button id="cpu-step" title="one CPU instruction">Instr</button>
    <button id="cpu-run" title="run until a breakpoint or a breaking watch">Run</button>
    <button id="cpu-brk">Break</button>
    <span class="sep"></span>
  </span>

  <label class="check" title="show what is being scanned out, not the buffer being drawn into">
    <input type="checkbox" id="scanout"> scanout</label>
  <label class="check" title="start the scrub from a black screen, so this frame's drawing is not mixed with the last frame's">
    <input type="checkbox" id="blank"> blank</label>
  <select id="zoom" title="zoom">
    <option value="fit">Fit</option>
    <option value="1">1×</option>
    <option value="2" selected>2×</option>
    <option value="3">3×</option>
    <option value="4">4×</option>
  </select>

  <span class="grow"></span>
  <span id="stats" class="muted"></span>
  <button id="reset-layout" title="restore the default panel layout">⟲</button>
</header>

<!-- The dock. Which panels exist depends on what the target says it can do; where they
     sit is the saved layout's business (dock.js). A group shows one panel at a time and
     any of them can be promoted to the stage. -->
<main>
  <div id="slot-stage" class="slot"></div>
  <div id="slot-side" class="slot"></div>
</main>
<footer id="dock-bottom">
  <div id="slot-bottom-left" class="slot"></div>
  <div id="slot-bottom-right" class="slot"></div>
</footer>

<!-- Panels are built here, where they can look their own elements up, before the dock
     moves them to wherever the layout wants them. -->
<div id="dock-staging" hidden></div>

<script type="module" src="app.js"></script>
</body>
</html>
